<script>
    // --- CẤU HÌNH ---
    const SUPABASE_URL = 'https://jwcwptknoynvthykuwbz.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_yCpypsxeIeUTndPCq9rBtQ__-85Kbjv';
    
    // Đổi tên biến ở đây để tránh trùng tên thư viện
    const sp = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // --- XỬ LÝ ĐĂNG NHẬP ---
    async function handleLogin() {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const { data, error } = await sp.auth.signInWithPassword({ email, password }); // Dùng 'sp'
        if (error) alert("Lỗi: " + error.message);
    }

    // --- GỬI MÃ OTP ---
    async function handleSendOTP() {
        const email = document.getElementById('reset-email').value;
        const { error } = await sp.auth.resetPasswordForEmail(email); // Dùng 'sp'
        if (error) alert("Lỗi: " + error.message);
        else {
            alert("Mã 6 số đã được gửi vào Gmail!");
            document.getElementById('otp-confirm').classList.remove('hidden');
            document.getElementById('btn-send-otp').classList.add('hidden');
        }
    }

    // --- XÁC NHẬN OTP VÀ CẬP NHẬT PASS ---
    async function handleVerifyOTP() {
        const email = document.getElementById('reset-email').value;
        const token = document.getElementById('otp-code').value;
        const newPassword = document.getElementById('new-password').value;

        const { data, error } = await sp.auth.verifyOtp({ email, token, type: 'recovery' }); // Dùng 'sp'
        
        if (error) alert("Mã không đúng: " + error.message);
        else {
            const { error: updateError } = await sp.auth.updateUser({ password: newPassword }); // Dùng 'sp'
            if (updateError) alert("Lỗi cập nhật: " + updateError.message);
            else {
                alert("Đổi mật khẩu thành công! Hãy đăng nhập lại.");
                location.reload();
            }
        }
    }

    // --- THEO DÕI TRẠNG THÁI ---
    sp.auth.onAuthStateChange(async (event, session) => { // Dùng 'sp'
        if (session) {
            document.getElementById('auth-form').classList.add('hidden');
            document.getElementById('main-content').classList.remove('hidden');
            document.getElementById('user-display').innerText = session.user.email;
            
            // Truy vấn quyền từ bảng profiles
            const { data } = await sp.from('profiles').select('role').eq('id', session.user.id).single(); // Dùng 'sp'
            if (data) {
                document.getElementById('role-display').innerText = data.role;
                if (data.role === 'admin') document.getElementById('admin-only').classList.remove('hidden');
            }
        } else {
            document.getElementById('auth-form').classList.remove('hidden');
            document.getElementById('main-content').classList.add('hidden');
        }
    });

    async function handleLogout() {
        await sp.auth.signOut(); // Dùng 'sp'
    }

    function toggleReset(show) {
        document.getElementById('login-fields').classList.toggle('hidden', show);
        document.getElementById('reset-fields').classList.toggle('hidden', !show);
        document.getElementById('form-title').innerText = show ? "Khôi phục mật khẩu" : "Đăng nhập";
    }
</script>
